
name: Build test and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test:

    runs-on: ubuntu-latest



    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
      
    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Install npm dependencies
      run: npm install

    - name: Start BE
      run: npm run start-be &

    - name: Start FE
      run: npm run start-fe &
   
    - name: Run tests
      run: npm test